services:
  - type: web
    name: nutritrack
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: /data/nutritrack.db
      - key: RENDER
        value: "true"
    disk:
      name: nutritrack-data
      mountPath: /data
      sizeGB: 1

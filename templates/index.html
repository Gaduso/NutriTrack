<!DOCTYPE html>
<html lang="de" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NutriTrack AI</title>

  <!-- PWA / iOS Homescreen -->
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#10b981" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NutriTrack" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      -webkit-tap-highlight-color: transparent;
      /* iOS notch / camera safe areas (viewport-fit=cover) */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade { animation: fadeIn .25s ease-out; }
    .spinner { border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 9999px; width: 1rem; height: 1rem; animation: spin .6s linear infinite; display:inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen antialiased">

  <!-- ============ LOGIN VIEW ============ -->
  <div id="auth-view" class="hidden min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-sm bg-slate-800 rounded-2xl p-8 shadow-xl border border-slate-700">
      <div class="flex flex-col items-center mb-6">
        <img src="/static/icon-192.png" class="w-16 h-16 rounded-xl mb-3" alt="logo" />
        <h1 class="text-2xl font-bold">NutriTrack <span class="text-emerald-400">AI</span></h1>
        <p class="text-slate-400 text-sm mt-1" id="auth-subtitle">Melde dich an, um zu tracken.</p>
      </div>
      <form id="auth-form" class="space-y-4">
        <input id="username" type="text" autocomplete="username" placeholder="Benutzername"
          class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500" />
        <input id="password" type="password" autocomplete="current-password" placeholder="Passwort"
          class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500" />
        <p id="auth-error" class="text-rose-400 text-sm hidden"></p>
        <button type="submit" id="auth-submit"
          class="w-full bg-emerald-500 hover:bg-emerald-600 transition rounded-xl py-3 font-semibold flex items-center justify-center gap-2">
          <span id="auth-submit-label">Anmelden</span>
        </button>
      </form>
      <button id="auth-toggle" class="w-full text-slate-400 hover:text-slate-200 text-sm mt-4">
        Noch kein Konto? Registrieren
      </button>
    </div>
  </div>

  <!-- ============ APP VIEW ============ -->
  <div id="app-view" class="hidden max-w-xl mx-auto px-4 pb-16">
    <header class="flex items-center justify-between mb-5 pt-4">
      <div class="flex items-center gap-2">
        <img src="/static/icon-192.png" class="w-8 h-8 rounded-lg" alt="logo" />
        <h1 class="text-xl font-bold">NutriTrack <span class="text-emerald-400">AI</span></h1>
      </div>
      <div class="flex items-center gap-3">
        <button id="profile-btn" class="text-slate-400 hover:text-slate-200 text-xl" title="Profil / Ziele">⚙️</button>
        <button id="logout-btn" class="text-slate-400 hover:text-slate-200 text-sm">Abmelden</button>
      </div>
    </header>

    <!-- KPI Cards -->
    <div class="grid grid-cols-2 gap-3 mb-5">
      <div class="bg-slate-800 rounded-2xl p-4 border border-slate-700">
        <p class="text-slate-400 text-xs uppercase tracking-wide">Kalorien</p>
        <p class="mt-1"><span id="kpi-kcal" class="text-3xl font-bold">0</span>
          <span class="text-slate-400 text-sm">/ <span id="kpi-kcal-goal">–</span></span></p>
        <div class="w-full bg-slate-700 rounded-full h-1.5 mt-2"><div id="kpi-kcal-bar" class="bg-emerald-500 h-1.5 rounded-full" style="width:0%"></div></div>
      </div>
      <div class="bg-slate-800 rounded-2xl p-4 border border-slate-700">
        <p class="text-slate-400 text-xs uppercase tracking-wide">Protein</p>
        <p class="mt-1"><span id="kpi-protein" class="text-3xl font-bold">0</span>
          <span class="text-slate-400 text-sm">g / <span id="kpi-protein-goal">–</span>g</span></p>
        <div class="w-full bg-slate-700 rounded-full h-1.5 mt-2"><div id="kpi-protein-bar" class="bg-indigo-500 h-1.5 rounded-full" style="width:0%"></div></div>
      </div>
    </div>

    <!-- Meal-type selector (shared by AI + manual entry; smart default by time) -->
    <div id="mealtype-tabs" class="grid grid-cols-4 gap-2 mb-3"></div>

    <!-- Input -->
    <textarea id="meal-input" rows="3" placeholder="Was hast du gegessen?..."
      class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 focus:outline-none focus:border-emerald-500 resize-none"></textarea>

    <div class="grid grid-cols-2 gap-3 mt-3">
      <button id="estimate-btn"
        class="bg-indigo-600 hover:bg-indigo-700 transition rounded-xl py-3 font-semibold flex items-center justify-center gap-2">
        <span>Nur Schätzen</span>
      </button>
      <button id="analyze-btn"
        class="bg-emerald-500 hover:bg-emerald-600 transition rounded-xl py-3 font-semibold flex items-center justify-center gap-2">
        <span>Analysieren &amp; Hinzufügen</span>
      </button>
    </div>

    <!-- Manual entry (collapsible) -->
    <button id="manual-toggle" class="w-full mt-3 text-slate-400 hover:text-slate-200 text-sm flex items-center justify-center gap-1">
      <span id="manual-toggle-icon">＋</span> Manueller Eintrag
    </button>
    <div id="manual-form" class="hidden bg-slate-800 rounded-2xl p-4 border border-slate-700 mt-2 animate-fade space-y-3">
      <input id="m-name" type="text" placeholder="Bezeichnung (z.B. Apfel)"
        class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-emerald-500" />
      <div class="grid grid-cols-3 gap-2">
        <input id="m-amount" type="text" placeholder="Menge"
          class="bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-emerald-500" />
        <input id="m-kcal" type="number" min="0" placeholder="kcal"
          class="bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-right focus:outline-none focus:border-emerald-500" />
        <input id="m-protein" type="number" min="0" step="0.1" placeholder="Protein g"
          class="bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-right focus:outline-none focus:border-emerald-500" />
      </div>
      <button id="m-save"
        class="w-full bg-emerald-500 hover:bg-emerald-600 transition rounded-xl py-2.5 font-semibold flex items-center justify-center gap-2">
        <span>Hinzufügen</span>
      </button>
    </div>

    <!-- Preview -->
    <div id="preview" class="hidden bg-slate-800 rounded-2xl p-4 border border-slate-700 mt-4 animate-fade">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-semibold">Vorschau</h2>
        <button id="preview-close" class="text-slate-400 hover:text-slate-200 text-sm">✕</button>
      </div>
      <div id="preview-items" class="space-y-2"></div>
      <div class="flex justify-between items-center mt-4 pt-3 border-t border-slate-700 text-sm">
        <span class="text-slate-400">Summe</span>
        <span><b id="preview-total-kcal">0</b> kcal · <b id="preview-total-protein">0</b> g</span>
      </div>
      <div class="mt-4">
        <button id="save-btn"
          class="w-full bg-emerald-500 hover:bg-emerald-600 transition rounded-xl py-3 font-semibold flex items-center justify-center gap-2">
          <span>Bestätigen &amp; Speichern</span>
        </button>
      </div>
    </div>

    <!-- Today (individual items) -->
    <div class="mt-6">
      <h2 class="font-semibold mb-3 text-slate-300">Heute</h2>
      <div id="history" class="space-y-2"></div>
      <p id="history-empty" class="text-slate-500 text-sm hidden">Noch keine Einträge heute.</p>
    </div>

    <!-- Stats overview -->
    <div class="mt-8">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-semibold text-slate-300">Übersicht</h2>
        <div id="stats-tabs" class="flex bg-slate-800 border border-slate-700 rounded-xl p-1 text-sm">
          <button data-period="week"  class="stat-tab px-3 py-1 rounded-lg">Woche</button>
          <button data-period="month" class="stat-tab px-3 py-1 rounded-lg">Monat</button>
          <button data-period="all"   class="stat-tab px-3 py-1 rounded-lg">Gesamt</button>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3 mb-3">
        <div class="bg-slate-800 rounded-2xl p-4 border border-slate-700">
          <p class="text-slate-400 text-xs uppercase tracking-wide">Ø kcal / Tag</p>
          <p class="text-2xl font-bold mt-1" id="stat-avg-kcal">0</p>
          <p class="text-slate-500 text-xs mt-1">Σ <span id="stat-total-kcal">0</span> kcal</p>
        </div>
        <div class="bg-slate-800 rounded-2xl p-4 border border-slate-700">
          <p class="text-slate-400 text-xs uppercase tracking-wide">Ø Protein / Tag</p>
          <p class="text-2xl font-bold mt-1"><span id="stat-avg-protein">0</span> g</p>
          <p class="text-slate-500 text-xs mt-1">Σ <span id="stat-total-protein">0</span> g</p>
        </div>
      </div>
      <p class="text-slate-500 text-xs mb-2"><span id="stat-days">0</span> Tage getrackt</p>

      <div id="stat-daily" class="space-y-2"></div>
      <p id="stat-empty" class="text-slate-500 text-sm hidden">Noch keine Daten in diesem Zeitraum.</p>
    </div>
  </div>

  <!-- ============ PROFILE MODAL ============ -->
  <div id="profile-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/60">
    <div class="w-full max-w-sm bg-slate-800 rounded-2xl p-6 border border-slate-700 animate-fade">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold">Tagesziele</h2>
        <button id="profile-close" class="text-slate-400 hover:text-slate-200">✕</button>
      </div>
      <p class="text-slate-400 text-sm mb-4" id="profile-user"></p>
      <label class="block text-sm text-slate-400 mb-1">Kalorien-Ziel (kcal)</label>
      <input id="goal-kcal" type="number" min="0"
        class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 mb-4 focus:outline-none focus:border-emerald-500" />
      <label class="block text-sm text-slate-400 mb-1">Protein-Ziel (g)</label>
      <input id="goal-protein" type="number" min="0" step="0.1"
        class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 mb-5 focus:outline-none focus:border-emerald-500" />
      <button id="goal-save"
        class="w-full bg-emerald-500 hover:bg-emerald-600 transition rounded-xl py-3 font-semibold flex items-center justify-center gap-2">
        <span>Speichern</span>
      </button>
    </div>
  </div>

  <script>
  (() => {
    const API = "";
    const TOKEN_KEY = "nutritrack_token";
    let isRegister = false;
    let currentPeriod = "week";

    // Meal categories — order matters for grouping/display.
    const MEAL_TYPES = [
      { key: "breakfast", label: "Frühstück", icon: "🌅" },
      { key: "lunch",     label: "Mittag",    icon: "☀️" },
      { key: "dinner",    label: "Abend",     icon: "🌙" },
      { key: "snack",     label: "Snack",     icon: "🍪" },
    ];
    const MT = Object.fromEntries(MEAL_TYPES.map((m) => [m.key, m]));
    function defaultMealType() {
      const h = new Date().getHours();
      if (h < 11) return "breakfast";
      if (h < 15) return "lunch";
      if (h >= 17 && h < 22) return "dinner";
      return "snack";
    }
    let selectedMealType = defaultMealType();

    const $ = (id) => document.getElementById(id);
    const token = () => localStorage.getItem(TOKEN_KEY);
    const setToken = (t) => localStorage.setItem(TOKEN_KEY, t);
    const clearToken = () => localStorage.removeItem(TOKEN_KEY);

    async function api(path, { method = "GET", body } = {}) {
      const headers = { "Content-Type": "application/json" };
      if (token()) headers["Authorization"] = "Bearer " + token();
      const res = await fetch(API + path, {
        method, headers, body: body ? JSON.stringify(body) : undefined,
      });
      if (res.status === 401) { clearToken(); showAuth(); throw new Error("401"); }
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || "Fehler");
      return data;
    }

    function setLoading(btn, on) {
      btn.disabled = on;
      btn.style.opacity = on ? "0.7" : "1";
      const span = btn.querySelector("span");
      if (on) { btn.dataset.label = span.textContent; span.innerHTML = '<span class="spinner"></span>'; }
      else if (btn.dataset.label) { span.textContent = btn.dataset.label; }
    }

    const escapeHtml = (s) =>
      String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

    // ---------- Views ----------
    function showAuth() { $("auth-view").classList.remove("hidden"); $("app-view").classList.add("hidden"); }
    function showApp() {
      $("auth-view").classList.add("hidden");
      $("app-view").classList.remove("hidden");
      loadDashboard();
      loadStats(currentPeriod);
    }

    // ---------- Auth ----------
    $("auth-toggle").addEventListener("click", () => {
      isRegister = !isRegister;
      $("auth-submit-label").textContent = isRegister ? "Registrieren" : "Anmelden";
      $("auth-subtitle").textContent = isRegister ? "Erstelle dein Konto." : "Melde dich an, um zu tracken.";
      $("auth-toggle").textContent = isRegister ? "Schon ein Konto? Anmelden" : "Noch kein Konto? Registrieren";
      $("auth-error").classList.add("hidden");
    });

    $("auth-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = $("username").value.trim();
      const password = $("password").value;
      $("auth-error").classList.add("hidden");
      setLoading($("auth-submit"), true);
      try {
        const data = await api(isRegister ? "/api/register" : "/api/login", {
          method: "POST", body: { username, password },
        });
        setToken(data.token);
        showApp();
      } catch (err) {
        $("auth-error").textContent = err.message;
        $("auth-error").classList.remove("hidden");
      } finally {
        setLoading($("auth-submit"), false);
      }
    });

    $("logout-btn").addEventListener("click", () => { clearToken(); showAuth(); });

    // ---------- Profile / Goals ----------
    async function openProfile() {
      try {
        const p = await api("/api/profile");
        $("profile-user").textContent = "Angemeldet als " + p.username;
        $("goal-kcal").value = p.kcal_goal;
        $("goal-protein").value = p.protein_goal;
        $("profile-modal").classList.remove("hidden");
      } catch (_) {}
    }
    $("profile-btn").addEventListener("click", openProfile);
    $("profile-close").addEventListener("click", () => $("profile-modal").classList.add("hidden"));
    $("profile-modal").addEventListener("click", (e) => {
      if (e.target === $("profile-modal")) $("profile-modal").classList.add("hidden");
    });
    $("goal-save").addEventListener("click", async () => {
      setLoading($("goal-save"), true);
      try {
        await api("/api/profile", {
          method: "PUT",
          body: {
            kcal_goal: parseInt($("goal-kcal").value || 0, 10),
            protein_goal: parseFloat($("goal-protein").value || 0),
          },
        });
        $("profile-modal").classList.add("hidden");
        loadDashboard();
      } catch (err) {
        alert(err.message);
      } finally {
        setLoading($("goal-save"), false);
      }
    });

    // ---------- Dashboard (today) ----------
    const pct = (v, goal) => (goal > 0 ? Math.min(100, Math.round((v / goal) * 100)) : 0) + "%";

    async function loadDashboard() {
      try {
        const d = await api("/api/dashboard");
        $("kpi-kcal").textContent = d.total_kcal;
        $("kpi-kcal-goal").textContent = d.kcal_goal;
        $("kpi-kcal-bar").style.width = pct(d.total_kcal, d.kcal_goal);
        $("kpi-protein").textContent = d.total_protein;
        $("kpi-protein-goal").textContent = d.protein_goal;
        $("kpi-protein-bar").style.width = pct(d.total_protein, d.protein_goal);
        renderHistory(d.items, d.by_type);
      } catch (_) {}
    }

    function renderHistory(items, byType) {
      const wrap = $("history");
      wrap.innerHTML = "";
      $("history-empty").classList.toggle("hidden", items.length > 0);

      // Group items by meal type, preserving category order.
      MEAL_TYPES.forEach((mt) => {
        const group = items.filter((it) => (it.meal_type || "snack") === mt.key);
        if (!group.length) return;
        const sub = (byType && byType[mt.key]) || { kcal: 0, protein: 0 };

        const header = document.createElement("div");
        header.className = "flex items-center justify-between mt-4 mb-2 first:mt-0";
        header.innerHTML = `
          <span class="font-medium text-slate-300">${mt.icon} ${mt.label}</span>
          <span class="text-slate-500 text-xs">${sub.kcal} kcal · ${sub.protein} g</span>`;
        wrap.appendChild(header);

        group.forEach((it) => {
          const el = document.createElement("div");
          el.className = "bg-slate-800 rounded-xl p-3 border border-slate-700 flex items-center justify-between gap-3 animate-fade";
          const time = new Date(it.timestamp).toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
          const meta = [it.amount, `${it.kcal} kcal`, `${it.protein} g`, time].filter(Boolean).join(" · ");
          el.innerHTML = `
            <div class="min-w-0">
              <p class="font-medium truncate">${escapeHtml(it.name)}</p>
              <p class="text-slate-400 text-sm">${escapeHtml(meta)}</p>
            </div>
            <button data-id="${it.id}" class="del-btn text-slate-500 hover:text-rose-400 shrink-0" title="Löschen">🗑️</button>`;
          wrap.appendChild(el);
        });
      });

      wrap.querySelectorAll(".del-btn").forEach((b) =>
        b.addEventListener("click", async () => {
          await api("/api/meal/" + b.dataset.id, { method: "DELETE" });
          loadDashboard();
          loadStats(currentPeriod);
        })
      );
    }

    // ---------- Stats (week / month / all) ----------
    function highlightTab() {
      document.querySelectorAll(".stat-tab").forEach((t) => {
        const active = t.dataset.period === currentPeriod;
        t.classList.toggle("bg-emerald-500", active);
        t.classList.toggle("text-white", active);
        t.classList.toggle("text-slate-400", !active);
      });
    }

    async function loadStats(period) {
      currentPeriod = period;
      highlightTab();
      try {
        const s = await api("/api/stats?period=" + period);
        $("stat-avg-kcal").textContent = s.avg_kcal;
        $("stat-avg-protein").textContent = s.avg_protein;
        $("stat-total-kcal").textContent = s.total_kcal;
        $("stat-total-protein").textContent = s.total_protein;
        $("stat-days").textContent = s.days_tracked;
        renderDaily(s.daily);
      } catch (_) {}
    }

    function renderDaily(daily) {
      const wrap = $("stat-daily");
      wrap.innerHTML = "";
      $("stat-empty").classList.toggle("hidden", daily.length > 0);
      daily.forEach((d) => {
        const el = document.createElement("div");
        el.className = "bg-slate-800 rounded-xl p-3 border border-slate-700 flex items-center justify-between text-sm animate-fade";
        const dateStr = new Date(d.date + "T00:00:00").toLocaleDateString("de-DE", { weekday: "short", day: "2-digit", month: "2-digit" });
        el.innerHTML = `
          <span class="text-slate-300">${escapeHtml(dateStr)}</span>
          <span class="text-slate-400"><b class="text-slate-100">${d.kcal}</b> kcal · <b class="text-slate-100">${d.protein}</b> g</span>`;
        wrap.appendChild(el);
      });
    }

    document.querySelectorAll(".stat-tab").forEach((t) =>
      t.addEventListener("click", () => loadStats(t.dataset.period))
    );

    // ---------- Analyze / Preview ----------
    async function runAnalyze(btn) {
      const text = $("meal-input").value.trim();
      if (!text) return;
      setLoading(btn, true);
      try {
        const result = await api("/api/meal/analyze", { method: "POST", body: { text } });
        renderPreview(result, text);
      } catch (err) {
        alert(err.message);
      } finally {
        setLoading(btn, false);
      }
    }

    $("estimate-btn").addEventListener("click", () => runAnalyze($("estimate-btn")));
    $("analyze-btn").addEventListener("click", () => runAnalyze($("analyze-btn")));
    $("preview-close").addEventListener("click", () => $("preview").classList.add("hidden"));

    function recomputeTotals() {
      let kcal = 0, protein = 0;
      document.querySelectorAll("#preview-items [data-row]").forEach((row) => {
        kcal += parseInt(row.querySelector(".inp-kcal").value || 0, 10);
        protein += parseFloat(row.querySelector(".inp-protein").value || 0);
      });
      $("preview-total-kcal").textContent = kcal;
      $("preview-total-protein").textContent = Math.round(protein * 10) / 10;
    }

    function renderPreview(result, rawText) {
      const box = $("preview-items");
      box.innerHTML = "";
      (result.items || []).forEach((it) => {
        const row = document.createElement("div");
        row.setAttribute("data-row", "");
        row.dataset.name = it.name;
        row.dataset.amount = it.amount || "";
        row.className = "flex items-center gap-2 text-sm";
        row.innerHTML = `
          <div class="flex-1 min-w-0">
            <p class="font-medium truncate">${escapeHtml(it.name)}</p>
            <p class="text-slate-400 text-xs">${escapeHtml(it.amount || "")}</p>
          </div>
          <input type="number" class="inp-kcal w-16 bg-slate-900 border border-slate-700 rounded-lg px-2 py-1 text-right" value="${it.kcal}" />
          <span class="text-slate-500 text-xs">kcal</span>
          <input type="number" step="0.1" class="inp-protein w-14 bg-slate-900 border border-slate-700 rounded-lg px-2 py-1 text-right" value="${it.protein}" />
          <span class="text-slate-500 text-xs">g</span>`;
        box.appendChild(row);
      });
      box.querySelectorAll("input").forEach((i) => i.addEventListener("input", recomputeTotals));
      recomputeTotals();
      $("preview").dataset.rawText = rawText;
      $("preview").classList.remove("hidden");
      $("preview").scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    $("save-btn").addEventListener("click", async () => {
      const items = [];
      document.querySelectorAll("#preview-items [data-row]").forEach((row) => {
        items.push({
          name: row.dataset.name,
          amount: row.dataset.amount,
          kcal: parseInt(row.querySelector(".inp-kcal").value || 0, 10),
          protein: parseFloat(row.querySelector(".inp-protein").value || 0),
        });
      });
      if (!items.length) return;
      const payload = { raw_text: $("preview").dataset.rawText || "", meal_type: selectedMealType, items };
      setLoading($("save-btn"), true);
      try {
        await api("/api/meal/save", { method: "POST", body: payload });
        $("preview").classList.add("hidden");
        $("meal-input").value = "";
        loadDashboard();
        loadStats(currentPeriod);
      } catch (err) {
        alert(err.message);
      } finally {
        setLoading($("save-btn"), false);
      }
    });

    // ---------- Meal-type selector ----------
    function buildMealTypeTabs() {
      const wrap = $("mealtype-tabs");
      wrap.innerHTML = "";
      MEAL_TYPES.forEach((mt) => {
        const b = document.createElement("button");
        b.dataset.key = mt.key;
        b.className = "mt-tab rounded-xl py-2 text-sm border transition flex flex-col items-center gap-0.5";
        b.innerHTML = `<span>${mt.icon}</span><span class="text-xs">${mt.label}</span>`;
        b.addEventListener("click", () => { selectedMealType = mt.key; highlightMealType(); });
        wrap.appendChild(b);
      });
      highlightMealType();
    }
    function highlightMealType() {
      document.querySelectorAll(".mt-tab").forEach((t) => {
        const active = t.dataset.key === selectedMealType;
        t.classList.toggle("bg-emerald-500", active);
        t.classList.toggle("border-emerald-500", active);
        t.classList.toggle("text-white", active);
        t.classList.toggle("bg-slate-800", !active);
        t.classList.toggle("border-slate-700", !active);
        t.classList.toggle("text-slate-300", !active);
      });
    }

    // ---------- Manual entry ----------
    $("manual-toggle").addEventListener("click", () => {
      const f = $("manual-form");
      const open = f.classList.toggle("hidden") === false;
      $("manual-toggle-icon").textContent = open ? "－" : "＋";
    });
    $("m-save").addEventListener("click", async () => {
      const name = $("m-name").value.trim();
      if (!name) { $("m-name").focus(); return; }
      const item = {
        name,
        amount: $("m-amount").value.trim(),
        kcal: parseInt($("m-kcal").value || 0, 10),
        protein: parseFloat($("m-protein").value || 0),
      };
      setLoading($("m-save"), true);
      try {
        await api("/api/meal/save", {
          method: "POST",
          body: { raw_text: "", meal_type: selectedMealType, items: [item] },
        });
        ["m-name", "m-amount", "m-kcal", "m-protein"].forEach((id) => ($(id).value = ""));
        loadDashboard();
        loadStats(currentPeriod);
      } catch (err) {
        alert(err.message);
      } finally {
        setLoading($("m-save"), false);
      }
    });

    // ---------- Boot ----------
    buildMealTypeTabs();
    highlightTab();
    if (token()) showApp(); else showAuth();
  })();
  </script>
</body>
</html>
